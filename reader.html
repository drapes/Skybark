<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Skybark &amp; Bitebolt Reader</title>
    <link rel="stylesheet" href="reader.css?v=reader-flow-completion">
  </head>
  <body>
    <main class="reader-shell" aria-label="Skybark and Bitebolt comic reader">
      <header class="reader-bar">
        <div>
          <p class="kicker">The Adventures of Skybark and Bitebolt</p>
          <h1 id="episodeTitle">Loading...</h1>
        </div>
        <div class="reader-actions" aria-label="Reader controls">
          <a class="library-link" href="index.html">Library</a>
          <button class="library-link resume-button" id="resumeButton" type="button" hidden>Resume</button>
          <button class="icon-button" id="fullscreenButton" type="button" aria-label="Enter fullscreen" title="Enter fullscreen">
            <span class="fullscreen-icon" aria-hidden="true">⛶</span>
          </button>
          <button class="icon-button" id="prevButton" type="button" aria-label="Previous page" title="Previous page">
            <span aria-hidden="true">‹</span>
          </button>
          <span class="page-counter" id="pageCounter" aria-live="polite"></span>
          <button class="icon-button" id="nextButton" type="button" aria-label="Next page" title="Next page">
            <span aria-hidden="true">›</span>
          </button>
        </div>
      </header>

      <button class="fullscreen-top-zone" id="fullscreenTopZone" type="button" aria-label="Show fullscreen controls"></button>
      <div class="fullscreen-overlay" id="fullscreenOverlay" aria-label="Fullscreen controls">
        <a class="library-link" href="index.html">Library</a>
        <button class="library-link resume-button" id="fullscreenResumeButton" type="button" hidden>Resume</button>
        <button class="library-link fullscreen-exit" id="fullscreenExitButton" type="button">Exit</button>
      </div>

      <div class="completion-overlay" id="completionOverlay" role="dialog" aria-modal="false" aria-labelledby="completionTitle" hidden>
        <div class="completion-panel">
          <p class="kicker">Episode Complete</p>
          <h2 id="completionTitle">Nice reading!</h2>
          <div class="completion-actions">
            <button class="library-link fullscreen-exit" id="completionExitButton" type="button">Exit</button>
            <a class="library-link" href="index.html">Library</a>
            <a class="library-link" id="nextEpisodeLink" href="index.html">Next Episode</a>
          </div>
        </div>
      </div>

      <section class="stage" aria-label="Comic page">
        <div class="book" id="book">
          <div class="page-stack" aria-hidden="true"></div>
          <button class="turn-zone turn-zone-left" id="leftZone" type="button" aria-label="Previous page"></button>
          <button class="turn-zone turn-zone-right" id="rightZone" type="button" aria-label="Next page"></button>

          <div class="page-base page-surface">
            <img id="basePage" alt="">
          </div>

          <div class="flip-sheet" id="flipSheet" aria-hidden="true">
            <div class="sheet-face sheet-front page-surface">
              <img id="flipFront" alt="">
            </div>
            <div class="sheet-face sheet-back page-surface">
              <img id="flipBack" alt="">
            </div>
          </div>
        </div>
      </section>

      <footer class="scrubber" aria-label="Page thumbnails">
        <div class="thumb-track" id="thumbTrack"></div>
      </footer>
    </main>

    <script src="episodes/catalog.js?v=vault-flags"></script>
    <script src="reader.js?v=vault-flags"></script>
  </body>
</html>
